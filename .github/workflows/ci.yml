name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest jsonschema

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Validate log schemas
        run: python validate.py

      - name: Run integration demos
        run: |
          set -e
          python physics/substrate_alignment_check.py > /dev/null
          python physics/seven_generation_tracer.py > /dev/null
          python physics/violation_detector.py > /dev/null
          python ledger/verification_tools.py > /dev/null
          python -m consortium.kfc_runtime > /dev/null
          python -m consortium.ontology_layer > /dev/null
          python -m consortium.collaboration_protocol > /dev/null
          python -m consortium.embodied_sensor > /dev/null
          python -m consortium.bridges > /dev/null
          python -m consortium.examples.soil_with_hands > /dev/null
          python -m consortium.examples.cherokee_creation > /dev/null
          python -m consortium.examples.genesis_drift > /dev/null
          python -m examples.full_audit_session > /dev/null
          python -m knowledge_archaeology.examples.example_deploy_check > /dev/null
          python -m knowledge_archaeology.playground > /dev/null
          python -m audits.rational_actor_audit > /dev/null
          python -m audits.audit_runner --selftest > /dev/null
          python -m audits.substrate_aware_audit > /dev/null
          python -m consortium.audit.calibration_aggregator > /dev/null
          python physics/flow_static_axis.py > /dev/null
          python physics/calibration_metrology.py > /dev/null
          python physics/narrative_vector.py > /dev/null
          python -m audits.trainer_mismatch_audit > /dev/null
          python physics/monoculture_collapse_predictor.py > /dev/null
          python physics/substrate_scope_validator.py > /dev/null
          python physics/legacy_trap_detector.py > /dev/null
          python physics/breadcrumb_preservation.py > /dev/null
          (cd physics && python substrate_scope_envelopes.py) > /dev/null

  json-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./.git/*" | while read f; do
            python -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done
